<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নাঈমার বয়স ট্র্যাকার</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600&display=swap');

:root {
  --pink: #ff4d6d;
  --soft: #fff0f3;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans Bengali', sans-serif;
  background: linear-gradient(135deg, #ffe4e8, #fff0f3);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* MAIN CARD */
.container {
  width: 95%;
  max-width: 420px;
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(255, 77, 109, 0.15);
  backdrop-filter: blur(10px);
}

/* HEADER */
h1 {
  color: var(--pink);
  font-size: 1.9rem;
  margin-bottom: 5px;
}

.family {
  font-size: 1rem;
  margin-bottom: 6px;
}

.family span {
  color: var(--pink);
  font-weight: 600;
}

.extra {
  font-size: 0.95rem;
  margin-bottom: 10px;
}

.extra span {
  color: var(--pink);
  font-weight: 600;
}

/* INFO BOX */
.info {
  background: var(--soft);
  padding: 10px;
  border-radius: 12px;
  font-size: 0.9rem;
  margin-bottom: 12px;
}

/* AGE CARD */
.result {
  background: linear-gradient(135deg, #fff, #fff0f3);
  padding: 14px;
  border-radius: 18px;
}

/* AGE GRID */
.age-grid {
  display: flex;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 12px;
}

.age-box {
  flex: 1;
  background: #fff;
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.num {
  font-size: 1.4rem;
  color: var(--pink);
  font-weight: 600;
}

.label {
  font-size: 0.75rem;
  color: #666;
}

/* TIMER */
.timer {
  background: #fff;
  padding: 8px;
  border-radius: 20px;
  font-size: 1rem;
  font-weight: 600;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.timer span {
  color: var(--pink);
}

/* MOBILE OPTIMIZATION */
@media(max-width:400px){
  h1 { font-size: 1.7rem; }
  .num { font-size: 1.2rem; }
}
</style>
</head>

<body>

<div class="container">

  <h1>নাঈমা 💖</h1>

  <div class="family">
    বাবা: <span>নাঈম</span> ❤️ মা: <span>হাসি</span>
  </div>

  <div class="extra">
    রক্তের গ্রুপ: <span>AB+</span> • 
    ওজন: <span>২ কেজি ৬০০ গ্রাম</span>
  </div>

  <div class="info">
    জন্ম: ২৩ এপ্রিল ২০২৬ <br>
    সময়: সকাল ৮ঃ৪৫ মিনিট <br>
    বৃহস্পতিবার
  </div>

  <div class="result" id="output"></div>

</div>

<script>
function toBn(num) {
  const bn = '০১২৩৪৫৬৭৮৯';
  return num.toString().padStart(2,'0').replace(/\d/g, d => bn[d]);
}

function calculateAge() {
  const birth = new Date(2026, 3, 23, 8, 45, 0);
  const now = new Date();

  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  let days = now.getDate() - birth.getDate();

  let hrs = now.getHours() - birth.getHours();
  let mins = now.getMinutes() - birth.getMinutes();
  let secs = now.getSeconds() - birth.getSeconds();

  if (secs < 0) { secs += 60; mins--; }
  if (mins < 0) { mins += 60; hrs--; }
  if (hrs < 0) { hrs += 24; days--; }

  if (days < 0) {
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
    months--;
  }

  if (months < 0) {
    months += 12;
    years--;
  }

  document.getElementById('output').innerHTML = `
    <div class="age-grid">
      <div class="age-box">
        <div class="num">${toBn(years)}</div>
        <div class="label">বছর</div>
      </div>
      <div class="age-box">
        <div class="num">${toBn(months)}</div>
        <div class="label">মাস</div>
      </div>
      <div class="age-box">
        <div class="num">${toBn(days)}</div>
        <div class="label">দিন</div>
      </div>
    </div>

    <div class="timer">
      <span>${toBn(hrs)}:${toBn(mins)}:${toBn(secs)}</span>
    </div>
  `;
}

setInterval(calculateAge, 1000);
calculateAge();
</script>

</body>
</html>
