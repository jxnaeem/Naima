<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>খাদিজা নূর এর বয়স ট্র্যাকার</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600&display=swap');

:root{
  --pink:#ff4d6d;
  --bg:#ffe4ea;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Noto Sans Bengali',sans-serif;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffe4ea,#fff0f3);
}

/* MAIN CARD */
.container{
  width:92%;
  max-width:420px;
  background:#fff;
  border-radius:26px;
  padding:18px 14px;
  box-shadow:0 12px 30px rgba(255,77,109,0.15);
  text-align:center;
}

/* TITLE */
h1{
  color:var(--pink);
  font-size:1.9rem;
}

/* FAMILY */
.family{
  margin-top:6px;
  font-size:1rem;
}

.family span{
  color:var(--pink);
  font-weight:600;
}

/* EXTRA INFO */
.extra{
  margin-top:6px;
  font-size:0.95rem;
}

.extra span{
  color:var(--pink);
  font-weight:600;
}

/* INFO BOX */
.info{
  margin-top:10px;
  background:#fff0f3;
  padding:10px;
  border-radius:14px;
  font-size:0.9rem;
}

/* AGE GRID */
.age-grid{
  display:flex;
  justify-content:space-between;
  margin-top:14px;
  gap:8px;
}

.box{
  flex:1;
  background:#fff;
  border-radius:14px;
  padding:10px 5px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.num{
  font-size:1.4rem;
  color:var(--pink);
  font-weight:600;
}

.label{
  font-size:0.8rem;
  color:#666;
}

/* TIMER */
.timer{
  margin-top:12px;
  background:#fff;
  padding:10px;
  border-radius:20px;
  font-weight:600;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.timer span{
  color:var(--pink);
}
</style>
</head>

<body>

<div class="container">

  <h1>খাদিজা নূর 💖</h1>
<b>
  <div class="family">
    বাবা: <span>নাঈম</span> ❤️ মা: <span>হাসি</span>
  </div>

  <div class="extra">
    রক্তের গ্রুপ: <span>AB+</span> । ওজন: <span>২ কেজি ৬০০ গ্রাম</span>
  </div>

  <div class="info">
    জন্ম তারিখ:  ২৩ এপ্রিল ২০২৬ ইং <br>
    সময়: সকাল ৮ঃ৪৫ মিনিট <br>
    <p style="color:#ff4d6d;">বৃহস্পতিবার</p>
  </div>
</b>
  <div class="age-grid">
    <div class="box">
      <div class="num" id="year">০০</div>
      <div class="label">বছর</div>
    </div>
    <div class="box">
      <div class="num" id="month">০০</div>
      <div class="label">মাস</div>
    </div>
    <div class="box">
      <div class="num" id="day">০০</div>
      <div class="label">দিন</div>
    </div>
  </div>

  <div class="timer" id="timer">০০ ঘন্টা ০০ মিনিট ০০ সেকেন্ড</div>

</div>

<script>

function toBn(n){
  const bn="০১২৩৪৫৬৭৮৯";
  return n.toString().padStart(2,'0').replace(/\d/g,d=>bn[d]);
}

function updateAge(){

  const birth = new Date(2026,3,23,8,45,0);
  const now = new Date();

  let years = now.getFullYear()-birth.getFullYear();
  let months = now.getMonth()-birth.getMonth();
  let days = now.getDate()-birth.getDate();

  let hrs = now.getHours()-birth.getHours();
  let mins = now.getMinutes()-birth.getMinutes();
  let secs = now.getSeconds()-birth.getSeconds();

  if(secs<0){secs+=60;mins--;}
  if(mins<0){mins+=60;hrs--;}
  if(hrs<0){hrs+=24;days--;}

  if(days<0){
    const prev=new Date(now.getFullYear(),now.getMonth(),0);
    days+=prev.getDate();
    months--;
  }

  if(months<0){
    months+=12;
    years--;
  }

  document.getElementById("year").innerText=toBn(years);
  document.getElementById("month").innerText=toBn(months);
  document.getElementById("day").innerText=toBn(days);

  document.getElementById("timer").innerHTML=
    `<span>${toBn(hrs)} ঘন্টা ${toBn(mins)} মিনিট ${toBn(secs)} সেকেন্ড</span>`;
}

setInterval(updateAge,1000);
updateAge();

</script>

</body>
</html>
